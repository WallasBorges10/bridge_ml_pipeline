name: ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v
      - name: Train model
        run: python src/main.py --mode train --output_dir ./models
      - name: Generate sample JSON for API test
        run: |
          python -c "import pandas as pd; df = pd.read_csv('./models/sample_input.csv'); df.head(1).to_json('./models/sample_input.json', orient='records')"
      - name: Serve model (simulated)
        run: |
          mlflow models serve -m ./models/modelo_pontes_ny_rf_deploy.joblib -p 5002 &
          sleep 5
          curl -X POST http://localhost:5002/invocations -H "Content-Type: application/json" -d @./models/sample_input.json
      - name: Upload models
        uses: actions/upload-artifact@v3
        with:
          name: models
          path: ./models/